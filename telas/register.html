<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="../style/style.css">
    <title>Registrando seu treino</title>
</head>
<body>
    <header>
        <nav class="navbar bg-body-tertiary">
            <div class="container-fluid justify-content-start">
              <a class="navbar-brand" href="#">
                <img src="../img/login-active.png" alt="Logo" width="46" height="40" class="d-inline-block align-text-top">
              </a>
              <h3 class="h3 inter">
                activetracker
              </h3>
            </div>
          </nav>
    </header>
    <main>
        <div class="container text-center">
            <div class="row justify-content-center">
                <div class="col-5 gap-3">
                    <div class="p-4">
                        <h4 style="color: var(--Gray-800, #343A40);" class="h3 inter">Registrando seu treinamento</h4>
                    </div>
                </div>
            </div>
            <div class="row justify-content-center">
                <div class="col-5 gap-3 tela" id="tela1">
                    <div class="p-5">
                        <h4 class="inter">Quais Dias Da Semana você vai treinar...</h4>
                    </div>
                </div>
            </div>
            <div class="row">
                <div class="col">
                    <div class="table-responsive tela" id="tela1">
                        <table class="table table-bordered" style="width: 300px; margin: auto;">
                          <tbody>
                            <tr>
                              <td class="text-start" style="font-size: 1.2rem;">
                                <label for="segunda">Segunda-feira</label>
                              </td>
                              <td class="text-center">
                                <input class="form-check-input" type="checkbox" id="segunda" style="transform: scale(1.3);">
                              </td>
                            </tr>
                            <tr>
                              <td class="text-start" style="font-size: 1.2rem;">
                                <label for="terca">Terça-feira</label>
                              </td>
                              <td class="text-center">
                                <input class="form-check-input" type="checkbox" id="terca" style="transform: scale(1.3);">
                              </td>
                            </tr>
                            <tr>
                              <td class="text-start" style="font-size: 1.2rem;">
                                <label for="quarta">Quarta-feira</label>
                              </td>
                              <td class="text-center">
                                <input class="form-check-input" type="checkbox" id="quarta" style="transform: scale(1.3);">
                              </td>
                            </tr>
                            <tr>
                              <td class="text-start" style="font-size: 1.2rem;">
                                <label for="quinta">Quinta-feira</label>
                              </td>
                              <td class="text-center">
                                <input class="form-check-input" type="checkbox" id="quinta" style="transform: scale(1.3);">
                              </td>
                            </tr>
                            <tr>
                              <td class="text-start" style="font-size: 1.2rem;">
                                <label for="sexta">Sexta-feira</label>
                              </td>
                              <td class="text-center">
                                <input class="form-check-input" type="checkbox" id="sexta" style="transform: scale(1.3);">
                              </td>
                            </tr>
                            <tr>
                              <td class="text-start" style="font-size: 1.2rem;">
                                <label for="sabado">Sábado</label>
                              </td>
                              <td class="text-center">
                                <input class="form-check-input" type="checkbox" id="sabado" style="transform: scale(1.3);">
                              </td>
                            </tr>
                            <tr>
                              <td class="text-start" style="font-size: 1.2rem;">
                                <label for="domingo">Domingo</label>
                              </td>
                              <td class="text-center">
                                <input class="form-check-input" type="checkbox" id="domingo" style="transform: scale(1.3);">
                              </td>
                            </tr>
                          </tbody>
                        </table>
                      </div>                      
                </div>
            </div>
            <div class="row justify-content-center">
              <div style="display: none;" class="col-5 gap-3 tela" id="tela2">
                <div class="p-5">
                  <h4 class="inter">Segunda-feira treino-de...</h4>
                </div>
              </div>
            </div>
            <div class="row">
              <div class="col">
                <div style="display: none;" class="table-responsive tela" id="tela2">
                  <table class="table table-bordered" style="width: 300px; margin: auto;">
                    <tbody>
                      <tr>
                        <td class="text-start" style="font-size: 1.2rem;">
                          <label for="peito">Peito</label>
                        </td>
                        <td class="text-center">
                          <input class="form-check-input" type="checkbox" id="peito" value="peito" style="transform: scale(1.3);">
                        </td>
                      </tr>
                      <tr>
                        <td class="text-start" style="font-size: 1.2rem;">
                          <label for="costas">Costas</label>
                        </td>
                        <td class="text-center">
                          <input class="form-check-input" type="checkbox" id="costas" value="costas" style="transform: scale(1.3);">
                        </td>
                      </tr>
                      <tr>
                        <td class="text-start" style="font-size: 1.2rem;">
                          <label for="pernas">Pernas</label>
                        </td>
                        <td class="text-center">
                          <input class="form-check-input" type="checkbox" id="pernas" value="pernas" style="transform: scale(1.3);">
                        </td>
                      </tr>
                      <tr>
                        <td class="text-start" style="font-size: 1.2rem;">
                          <label for="abdomen">Abdomen</label>
                        </td>
                        <td class="text-center">
                          <input class="form-check-input" type="checkbox" id="abdomen" value="abdomen" style="transform: scale(1.3);">
                        </td>
                      </tr>
                      <tr>
                        <td class="text-start" style="font-size: 1.2rem;">
                          <label for="cardiovascular">Cardiovascular</label>
                        </td>
                        <td class="text-center">
                          <input class="form-check-input" type="checkbox" id="cardiovascular" value="cardio" style="transform: scale(1.3);">
                        </td>
                      </tr>
                    </tbody>
                  </table>
                </div>                  
              </div>
            </div>
            <div class="row justify-content-center">
                <div style="display: none;" class="col-2 tela" id="tela2">
                    <div class="p-4">
                        <div class="d-grid gap-2 col-6 mx-auto">
                            <button onclick="lastTela()" class="btn btn-success" type="button">Voltar</button>
                        </div>
                    </div>
                </div>
                <div class="col-2">
                  <div class="p-4">
                      <div class="d-grid gap-2 col-6 mx-auto">
                          <button onclick="nextTela()" class="btn btn-success" type="button">Comfirmar</button>
                      </div>
                  </div>
              </div>
            </div>
        </div>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
    <script src="../script/register.js"></script>
</body>
</body>
</html>
